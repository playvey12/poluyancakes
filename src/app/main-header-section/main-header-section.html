<section class="hero">
    <div class="hero-container">
        <div class="hero-content">
            <h1 class="hero-title">
                Добро пожаловать в мир <span class="brand-name">Kenwood</span>
            </h1>
            <p class="hero-description">
                Здесь вы найдете всё необходимое для создания идеальной выпечки.
            </p>
            <div class="hero-buttons">
                <button (click)="scrollToProducts()" class="btn btn-primary">Каталог</button>
                <button (click)="scrollToContact()" class="btn btn-outline">Связаться</button>
            </div>
        </div>

        <div class="hero-image-wrapper">
            <img src="img/sale.png" alt="Kenwood Sale" class="hero-img">
        </div>
    </div>
 
</section>
